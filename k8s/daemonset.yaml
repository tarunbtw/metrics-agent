apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: metrics-agent
  namespace: monitoring
  labels:
    app: metrics-agent
spec:
  selector:
    matchLabels:
      app: metrics-agent
  template:
    metadata:
      labels:
        app: metrics-agent
    spec:
      containers:
        - name: metrics-agent
          image: ghcr.io/tarunbtw/metrics-agent:latest
          ports:
            - containerPort: 9100
              name: metrics
          envFrom:
            - configMapRef:
                name: metrics-agent-config
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 9100
            initialDelaySeconds: 3
            periodSeconds: 10