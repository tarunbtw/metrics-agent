run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - gofmt

linters-settings:
  errcheck:
    # Don't flag http.ResponseWriter.Write — the connection may already be broken.
    exclude-functions:
      - (net/http.ResponseWriter).Write

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
